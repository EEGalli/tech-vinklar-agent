name: Run Tech Vinklar Agent

on:
  workflow_dispatch:    # Manuell körning från Streamlit-knappen eller GitHub UI
  schedule:
    - cron: "0 7 * * *"  # Varje dag 08:00 vintertid / 09:00 sommartid svensk tid (07:00 UTC)

# Förhindra att två körningar (Streamlit-knapp + cron) skriver över varandras state.
# En andra körning köas tills den första är klar istället för att krocka.
concurrency:
  group: run-agent
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Behövs för att kunna pusha tillbaka rapporter
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          echo "── Cache FÖRE körning ──"
          python3 -c "import json; c=json.load(open('.agent_analysis_cache.json')); print(f'  {len(c)} items')" || echo "  (ingen cache)"
          python3 -u main.py
          echo ""
          echo "── Cache EFTER körning ──"
          python3 -c "import json; c=json.load(open('.agent_analysis_cache.json')); from collections import Counter; cnt=Counter(e.get('cached_at','?') for e in c.values()); print(f'  {len(c)} items totalt'); [print(f'    {d}: {n}') for d,n in sorted(cnt.items(), reverse=True)[:5]]"

      - name: Commit and push reports
        run: |
          git config user.name "Tech Vinklar Bot"
          git config user.email "actions@users.noreply.github.com"

          # Debug: vad finns i state-filerna?
          echo "── State-filer efter körning ──"
          ls -la .agent_*.json 2>/dev/null || echo "(inga state-filer hittades)"
          echo ""
          echo "── Cache-status ──"
          if [ -f .agent_analysis_cache.json ]; then
            python3 -c "import json; c=json.load(open('.agent_analysis_cache.json')); from collections import Counter; cnt=Counter(e.get('cached_at','?') for e in c.values()); print(f'Cache: {len(c)} totalt'); [print(f'  {d}: {n}') for d,n in sorted(cnt.items(), reverse=True)[:5]]"
          fi
          echo ""

          git add reports/ .agent_memory.json .agent_arenden.json .agent_dates.json .agent_analysis_cache.json
          echo "── Git status efter add ──"
          git status --short
          echo ""

          if git diff --staged --quiet; then
            echo "Inga ändringar att committa"
          else
            git commit -m "Auto: körning $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
